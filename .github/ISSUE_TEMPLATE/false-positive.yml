name: False positive report
description: Rule fired incorrectly on valid code
title: "[FP] "
labels: ["false-positive", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for improving signal quality. See [BENCHMARK.md](../docs/BENCHMARK.md) for our FP policy.
  - type: input
    id: rule
    attributes:
      label: Rule ID
      placeholder: ASP001
    validations:
      required: true
  - type: textarea
    id: snippet
    attributes:
      label: Code snippet (minimal repro)
      description: Anchor accounts struct or handler where the rule misfired
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Why this should NOT be flagged
    validations:
      required: true
  - type: dropdown
    id: anchor
    attributes:
      label: Anchor version
      options: ["0.29.x", "0.30.x", "0.31.x", "other"]
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this rule
          required: true
